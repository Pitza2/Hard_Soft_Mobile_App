[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    -std=gnu++17

; upload_port = /dev/cu.usbserial-0280MW6S
; monitor_port = /dev/cu.usbserial-0280MW6S

upload_speed = 115200
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

lib_deps =
    mobizt/FirebaseClient
    adafruit/Adafruit MPU6050
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BusIO
    adafruit/Adafruit GFX Library
    adafruit/Adafruit SSD1306
    protocentral/ProtoCentral MAX30205 Body Temperature Sensor Library
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library
    https://github.com/sparkfun/SparkFun_Bio_Sensor_Hub_Library.git
